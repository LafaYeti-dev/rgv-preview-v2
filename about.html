<title>Revive Global Ventures</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#1f3a2d;color:#f3eee3;font-family:Arial,sans-serif}
body.checking .card{visibility:hidden}
.card{width:min(100%,440px);padding:44px 38px 40px;text-align:center;border:1px solid #f3eee32e;background:#22301f;box-shadow:0 28px 80px #0d1a144f}
.rule{width:72px;height:1px;margin:0 auto 28px;background:#d19c4c}
h1{margin:0;font-family:Georgia,serif;font-size:clamp(29px,6vw,38px);font-weight:400;line-height:1.1}
h1 em{color:#d19c4c;font-style:italic}
p{margin:16px 0 28px;color:#f3eee3b8;font-size:13px;line-height:1.6;letter-spacing:.14em;text-transform:uppercase}
label{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
input{width:100%;height:52px;padding:0 16px;border:1px solid #f3eee355;border-radius:0;background:transparent;color:#f3eee3;font-size:17px;text-align:center;outline:none}
input:focus{border-color:#d19c4c;box-shadow:0 0 0 1px #d19c4c}
button{width:100%;height:52px;margin-top:14px;border:1px solid #d19c4c;border-radius:0;background:#d19c4c;color:#22301f;font-size:14px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}
button:hover,button:focus-visible{background:#b0692f;border-color:#b0692f;color:#f3eee3}
button:disabled{cursor:wait;opacity:.7}
.error{min-height:20px;margin:14px 0 0;color:#d19c4c;font-size:13px;letter-spacing:0;text-transform:none}
@media(max-width:520px){.card{padding:38px 24px 34px}}
</style>
