*{box-sizing:border-box}

button{width:100%;height:52px;margin-top:14px;border:1px solid #d19c4c;border-radius:0;background:#d19c4c;color:#22301f;font-size:14px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}

.error{min-height:20px;margin:14px 0 0;color:#d19c4c;font-size:13px;letter-spacing:0;text-transform:none}
