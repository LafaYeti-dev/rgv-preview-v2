button:hover,button:focus-visible{background:#b0692f;border-color:#b0692f;color:#f3eee3}
button:disabled{cursor:wait;opacity:.7}
.error{min-height:20px;margin:14px 0 0;color:#d19c4c;font-size:13px;letter-spacing:0;text-transform:none}
